<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 10th Birthday Evan!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;background:#07071a;overflow-x:hidden;font-family:'Fredoka One',cursive;}

.bg{position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,#1a0a3a,#07071a 70%);z-index:0;}

/* Stars */
.star{position:fixed;border-radius:50%;background:#fff;animation:tw var(--d,2s) ease-in-out infinite alternate;}
@keyframes tw{from{opacity:.1;transform:scale(.6);}to{opacity:1;transform:scale(1.3);}}

/* Confetti */
.cf{position:fixed;top:-20px;animation:fall var(--fd,4s) linear var(--fl,0s) infinite;z-index:4;}
@keyframes fall{0%{top:-20px;transform:translateX(0) rotate(0);}85%{opacity:1;}100%{top:105vh;transform:translateX(var(--dr,50px)) rotate(700deg);opacity:0;}}

.wrap{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;padding:16px 8px 140px;}

/* Title */
.ttop{font-size:clamp(2rem,6.5vw,5rem);color:#fff;text-shadow:0 0 18px #ff55ff,3px 3px 0 #6600cc;animation:rock 2s ease-in-out infinite alternate;}
.num{font-size:clamp(4.5rem,17vw,11rem);line-height:.88;background:linear-gradient(175deg,#ffe566,#ff8c00 50%,#ff1a00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 35px #ff7700);animation:np 1.3s ease-in-out infinite alternate;display:block;}
.tbot{font-size:clamp(1.7rem,5.5vw,3.8rem);color:#00ffcc;text-shadow:0 0 18px #00ffcc,3px 3px 0 #005599;animation:rock 2s ease-in-out infinite alternate-reverse;}
@keyframes rock{from{transform:translateY(-4px) rotate(-1deg);}to{transform:translateY(4px) rotate(1deg);}}
@keyframes np{from{transform:scale(1) rotate(-1.5deg);}to{transform:scale(1.07) rotate(1.5deg);}}

/* Scene */
.scene{width:100%;max-width:1000px;height:420px;position:relative;margin-top:20px;overflow:hidden;border-radius:14px;background:linear-gradient(180deg,#09093a 0%,#0a1a0a 72%,#152208 100%);}

/* Ground */
.gnd{position:absolute;bottom:0;left:0;right:0;height:72px;background:linear-gradient(180deg,#1e5c12 0%,#0d2a08 100%);}
.gnd::before{content:'';position:absolute;top:0;left:0;right:0;height:14px;background:linear-gradient(90deg,#1a6010,#2e8a18,#1a6010);border-radius:4px 4px 0 0;}

/* Characters as absolutely positioned divs */
.char{position:absolute;bottom:70px;cursor:default;z-index:12;}

/* Balloon holder characters */
.bchar{position:absolute;z-index:14;cursor:pointer;transition:filter .15s;}
.bchar:hover{filter:brightness(1.2);}

/* Falling animation when balloon popped */
.bchar.falling{animation:charFall 1.1s cubic-bezier(.55,.06,.68,.19) forwards!important;}
@keyframes charFall{0%{transform:translateY(0) rotate(0);}30%{transform:translateY(30px) rotate(15deg);}100%{transform:translateY(340px) rotate(45deg);opacity:0;}}

/* Balloon float animation */
.bfloat{animation:bfloat var(--bd,3s) ease-in-out infinite alternate;}
@keyframes bfloat{from{transform:translateY(0) rotate(calc(var(--bs,1)*-3deg));}to{transform:translateY(-18px) rotate(calc(var(--bs,1)*3deg));}}

/* Fireball */
.fireball{position:absolute;width:28px;height:22px;background:radial-gradient(ellipse,#aaddff 20%,#2299ff 55%,#0044cc 100%);border-radius:50%;z-index:20;pointer-events:none;box-shadow:0 0 18px 8px #44aaff,0 0 40px 15px rgba(0,100,255,0.4);animation:fbglow .25s ease-in-out infinite alternate;}
@keyframes fbglow{from{box-shadow:0 0 15px 6px #44aaff,0 0 32px 12px rgba(0,100,255,0.3);}to{box-shadow:0 0 25px 12px #88ccff,0 0 50px 20px rgba(0,150,255,0.5);}}

/* Pop burst */
.burst{position:absolute;pointer-events:none;z-index:25;animation:bpop .5s ease-out forwards;}
@keyframes bpop{0%{transform:scale(.2);opacity:1;}100%{transform:scale(2.5);opacity:0;}}

/* Pop particles */
.pp{position:absolute;border-radius:50%;pointer-events:none;animation:pout .7s ease-out forwards;z-index:24;}
@keyframes pout{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--px,40px),var(--py,-40px)) scale(0);opacity:0;}}

.score{font-size:1.45rem;color:#ffee00;text-shadow:0 0 14px #ffaa00;text-align:center;margin-top:12px;}
.popbtn{background:linear-gradient(135deg,#cc44ff,#5500cc);border:none;color:#fff;font-family:'Fredoka One',cursive;font-size:1.25rem;padding:13px 36px;border-radius:50px;cursor:pointer;margin-top:14px;box-shadow:0 0 25px rgba(180,80,255,.5);animation:bp 1.6s ease-in-out infinite alternate;z-index:20;position:relative;}
@keyframes bp{from{transform:scale(1);}to{transform:scale(1.05);box-shadow:0 0 44px rgba(180,80,255,.8);}}
.msg{font-size:clamp(1rem,3.2vw,1.7rem);color:#fff;text-align:center;margin:16px auto 0;max-width:660px;padding:11px 22px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.18);border-radius:18px;animation:mg 2.5s ease-in-out infinite alternate;}
@keyframes mg{from{box-shadow:0 0 18px rgba(255,80,255,.2);}to{box-shadow:0 0 36px rgba(80,180,255,.4);}}
</style>
</head>

// Create balloon+character combos
function createBalloonChar(data, leftPct) {
  const wrapper = document.createElement('div');
  wrapper.className = 'bfloat';
  wrapper.style.cssText = `position:absolute;left:${leftPct}%;bottom:auto;z-index:14;cursor:pointer;--bd:${data.floatD};--bs:${data.bs};display:flex;flex-direction:column;align-items:center;`;

  // Balloon SVG
  const bsvg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  bsvg.setAttribute('width','60');bsvg.setAttribute('height','80');bsvg.setAttribute('viewBox','0 0 60 80');
  const col=data.col, shine='rgba(255,255,255,0.35)';
  bsvg.innerHTML=`
    <ellipse cx="30" cy="34" rx="26" ry="30" fill="${col}" stroke="${col}" stroke-width="1"/>
    <ellipse cx="22" cy="20" rx="8" ry="12" fill="${shine}" transform="rotate(-20,22,20)"/>
    <ellipse cx="30" cy="64" rx="5" ry="3.5" fill="${col}"/>
    <line x1="30" y1="67" x2="30" y2="80" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>`;

  // Char SVG container
  const charDiv=document.createElement('div');
  charDiv.innerHTML=data.charSvg;

  wrapper.appendChild(bsvg);
  wrapper.appendChild(charDiv);

  // Set vertical position (float near top)
  wrapper.style.top=(data.startY)+'px';
  wrapper.dataset.col=data.col;

  wrapper.addEventListener('click',()=>popIt(wrapper,data.col));
  scene.appendChild(wrapper);

  // Animate into position
  setTimeout(()=>{
    wrapper.style.transition='top 1.5s cubic-bezier(.2,.8,.4,1)';
    wrapper.style.top='30px';
  },100+Math.random()*400);

  return wrapper;
}

function popIt(wrapper, col) {
  if(wrapper.dataset.popped) return;
  wrapper.dataset.popped='1';
  wrapper.style.cursor='default';

  // Remove float animation, trigger fall
  wrapper.style.animation='none';
  wrapper.classList.remove('bfloat');
  const charEl=wrapper.querySelector('div');
  if(charEl){
    charEl.style.animation='charFall 1.1s cubic-bezier(.55,.06,.68,.19) forwards';
    charEl.style.transformOrigin='center top';
  }
  // Pop the balloon (first child svg)
  const bsvg=wrapper.querySelector('svg');
  if(bsvg){
    bsvg.style.animation='bpop 0.4s ease-out forwards';
    bsvg.style.transformOrigin='center';
  }

  // Particles
  const rect=wrapper.getBoundingClientRect();
  const sRect=scene.getBoundingClientRect();
  const cx=rect.left-sRect.left+30, cy=rect.top-sRect.top+34;
  for(let i=0;i<12;i++){
    const p=document.createElement('div');
    p.className='pp';
    const a=(i/12)*Math.PI*2, d=35+Math.random()*35;
    p.style.cssText=`background:${col};width:${7+Math.random()*5}px;height:${7+Math.random()*5}px;left:${cx}px;top:${cy}px;--px:${Math.cos(a)*d}px;--py:${Math.sin(a)*d}px;`;
    scene.appendChild(p);
    setTimeout(()=>p.remove(),800);
  }

  popped++;
  const em=['💥','🎊','🎉','⭐','✨','🌟','🔥','⚡'];
  document.getElementById('score').textContent=`${em[~~(Math.random()*em.length)]} BOOM! ${popped} balloon${popped>1?'s':''} popped! ${em[~~(Math.random()*em.length)]}`;

  // launch firework
  for(let i=0;i<3;i++) setTimeout(()=>launchFW(),i*120);
  if(!fwRunning) animFW();

  // remove after fall
  setTimeout(()=>wrapper.remove(),1500);
}

// Fireball shooter (thunder character on ground)
function shootFireball(){
  // find a live balloon char
  const balloons=[...scene.querySelectorAll('.bfloat')];
  if(!balloons.length) return;
  const target=balloons[~~(Math.random()*balloons.length)];

  const shooter=document.getElementById('g3'); // zenitsu
  const sRect=scene.getBoundingClientRect();
  const shooterRect=shooter.getBoundingClientRect();
  const targetRect=target.getBoundingClientRect();

  const sx=shooterRect.left-sRect.left+34;
  const sy=shooterRect.top-sRect.top+30;
  const tx=targetRect.left-sRect.left+30;
  const ty=targetRect.top-sRect.top+34;

  const fb=document.createElement('div');
  fb.className='fireball';
  fb.style.left=sx+'px';
  fb.style.top=sy+'px';
  scene.appendChild(fb);

  const dx=tx-sx, dy=ty-sy, dist=Math.sqrt(dx*dx+dy*dy);
  const dur=dist/380; // seconds
  const startTime=performance.now();

  function moveFB(now){
    const t=Math.min((now-startTime)/(dur*1000),1);
    const cx=sx+dx*t, cy=sy+dy*t;
    fb.style.left=cx+'px';
    fb.style.top=cy+'px';
    if(t<1) requestAnimationFrame(moveFB);
    else {
      fb.remove();
      // Pop target if still alive
      if(!target.dataset.popped) popIt(target,target.dataset.col||'#ff8800');
    }
  }
  requestAnimationFrame(moveFB);
}

// Initial balloon chars
const positions=[8,28,50,73];
BCHARS.forEach((d,i)=>{
  setTimeout(()=>createBalloonChar(d,positions[i]),i*300+200);
});

// Spawn new set
function spawnBalloons(){
  const cols=['#ff3333','#aa44ff','#ff8800','#00bbff','#ff3399','#ffcc00'];
  const chars=[makeSvg_water,makeSvg_wind,makeSvg_flame,makeSvg_thunder];
  for(let i=0;i<4;i++){
    setTimeout(()=>{
      const d={
        col:cols[~~(Math.random()*cols.length)],
        charSvg:chars[~~(Math.random()*chars.length)](),
        startX:10+Math.random()*75,
        startY:-180,
        floatD:(2.2+Math.random()*1.5)+'s',
        bs:Math.random()>.5?1:-1
      };
      createBalloonChar(d,10+Math.random()*75);
    },i*200);
  }
  for(let i=0;i<5;i++) setTimeout(()=>launchFW(),i*200);
  if(!fwRunning) animFW();
}

// Auto fireball every 4-7 seconds
function scheduleFireball(){
  const delay=4000+Math.random()*3000;
  setTimeout(()=>{ shootFireball(); scheduleFireball(); },delay);
}
setTimeout(scheduleFireball,2500);

// Fireworks
const canvas=document.getElementById('fw');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const FWC=['#ff3366','#ff9900','#ffff00','#00ff88','#00ddff','#cc00ff','#ff6ef7','#ffcc00'];
let parts=[],fwRunning=false;
function launchFW(){
  const x=80+Math.random()*(window.innerWidth-160),y=50+Math.random()*(window.innerHeight*.44),c=FWC[~~(Math.random()*FWC.length)];
  for(let i=0;i<48;i++){const a=(i/48)*Math.PI*2,sp=3+Math.random()*6;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,col:c,life:1,sz:2+Math.random()*3});}
}
function animFW(){
  if(!parts.length){fwRunning=false;return;}
  fwRunning=true;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  parts=parts.filter(p=>p.life>0);
  for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.vx*=.97;p.life-=.017;ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;
  requestAnimationFrame(animFW);
}
setTimeout(()=>{for(let i=0;i<10;i++) setTimeout(()=>launchFW(),i*280);animFW();},700);
setInterval(()=>{for(let i=0;i<4;i++) setTimeout(()=>launchFW(),i*320);if(!fwRunning)animFW();},7000);
</script>
